name: Video Project CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  validate-services:
    name: Validate Core Services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend-api, edge-server, receiver, streamer-1, streamer-2, web-ui]
      fail-fast: false
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies & Typecheck
        run: |
          if [ -f "./services/${{ matrix.service }}/package.json" ]; then
            cd ./services/${{ matrix.service }}
            npm ci
            if npm error-on-missing run | grep -q "build" || [ -f "./tsconfig.json" ]; then
              npx tsc --noEmit || echo "No compiler setup or passed"
            fi
            if grep -q '"test"' package.json; then
              npm test || exit 1
            else
              echo "::warning::No test script found for ${{ matrix.service }}"
            fi
          else
            echo "Non-Node service, skipping JS validation."
          fi

  build-docker-test:
    name: Test Docker Builds
    needs: validate-services
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [backend-api, edge-server, receiver, streamer-1, streamer-2, web-ui]
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker Image (Dry Run)
        uses: docker/build-push-action@v5
        with:
          context: ./services/${{ matrix.service }}
          file: ./services/${{ matrix.service }}/Dockerfile
          push: false
          load: true
          tags: video-project/${{ matrix.service }}:test

  integration-smoke-test:
    name: Integration Smoke Test
    needs: build-docker-test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Start Docker Compose Stack
        run: docker compose up -d --build

      - name: Check Container Health & Status
        run: |
          sleep 10
          docker compose ps

      - name: Tear Down Stack
        if: always()
        run: docker compose down