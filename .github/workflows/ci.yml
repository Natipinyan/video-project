name: Video Project CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  run-api-tests:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' #
          cache: 'npm'
          cache-dependency-path: ./services/frontend-api/package-lock.json

      - name: Install Dependencies
        working-directory: ./services/frontend-api
        run: npm ci

      - name: Run Vitest Unit Tests
        working-directory: ./services/frontend-api
        run: npm test