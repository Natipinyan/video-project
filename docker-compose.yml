version: '3.8'

services:
  # 1. db
  redis:
    image: redis:alpine
    container_name: live-redis

  # 2. video process
  receiver-1:
      build: ./services/receiver
      container_name: live-receiver-1
      environment:
        - REDIS_URL=redis://redis:6379
        - CHANNEL_NAME=channel1
        - UDP_PORT=1234
        - TS_NODE_TRANSPILE_ONLY=true
        - TS_NODE_COMPILER_OPTIONS={"module":"commonjs","moduleResolution":"node"}
      volumes:
        - ./hls_out/ch1:/app/hls_out
      depends_on:
        - redis

  receiver-2:
    build: ./services/receiver
    container_name: live-receiver-2
    environment:
      - REDIS_URL=redis://redis:6379
      - CHANNEL_NAME=channel2
      - UDP_PORT=1235
      - TS_NODE_TRANSPILE_ONLY=true
      - TS_NODE_COMPILER_OPTIONS={"module":"commonjs","moduleResolution":"node"}
    volumes:
      - ./hls_out/ch2:/app/hls_out
    depends_on:
      - redis

  # 3. front
  api:
    build: ./services/frontend-api
    container_name: live-api
    environment:
      - REDIS_URL=redis://redis:6379
      - TS_NODE_TRANSPILE_ONLY=true
      - TS_NODE_COMPILER_OPTIONS={"module":"commonjs","moduleResolution":"node"}
    ports:
      - "3000:3000"
    depends_on:
      - redis

  # 4. streamer
  streamer-1:
      build: services/streamer-1
      container_name: live-streamer-1
      depends_on:
        - receiver-1

  streamer-2:
    build: services/streamer-2
    container_name: live-streamer-2
    depends_on:
      - receiver-2

  # 5. Web UI (React + Vite)
  web-ui:
    build: ./services/web-ui
    container_name: live-web-ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000
  #    depends_on:
  #      - edge-server


