version: '3.8'

services:

  # ==========================================
  # THE STREAMERS (Video Sources)
  # Responsible for generating or streaming the raw video feed.
  # ==========================================
  streamer-1:
    build: services/streamer-1
    container_name: live-streamer-1
    depends_on:
      receiver-1:
        condition: service_healthy

  streamer-2:
    build: services/streamer-2
    container_name: live-streamer-2
    depends_on:
      receiver-2:
        condition: service_healthy

  # ==========================================
  # BASE SITE: SOURCE SITE (Processing & Storage)
  # Receives, processes (HLS encoding), and stores video data locally.
  # ==========================================

  # Main database for the source site
  redis:
    image: redis:alpine
    container_name: live-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 1s
      retries: 3

  # Receivers handle UDP streams and convert them to HLS segments stored in Redis
  receiver-1:
    build: ./services/receiver
    container_name: live-receiver-1
    environment:
      - REDIS_URL=redis://redis:6379
      - CHANNEL_NAME=channel1
      - UDP_PORT=1234
      - TS_NODE_TRANSPILE_ONLY=true
      - TS_NODE_COMPILER_OPTIONS={"module":"NodeNext","moduleResolution":"NodeNext"}
    volumes:
      - ./hls_out/ch1:/app/hls_out
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "nc", "-zu", "127.0.0.1", "1234" ]
      interval: 3s
      timeout: 1s
      retries: 3


  receiver-2:
    build: ./services/receiver
    container_name: live-receiver-2
    environment:
      - REDIS_URL=redis://redis:6379
      - CHANNEL_NAME=channel2
      - UDP_PORT=1235
      - TS_NODE_TRANSPILE_ONLY=true
      - TS_NODE_COMPILER_OPTIONS={"module":"NodeNext","moduleResolution":"NodeNext"}
    volumes:
      - ./hls_out/ch2:/app/hls_out
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "nc", "-zu", "127.0.0.1", "1235" ]
      interval: 3s
      timeout: 1s
      retries: 3

  # ==========================================
  # THE SOURCE GATEWAY: BACKEND API
  # Exposes video segments and playlists from the Source Redis to distribution sites.
  # ==========================================
  api:
    build: services/backend-api
    container_name: live-api
    environment:
      - REDIS_URL=redis://redis:6379
      - TS_NODE_TRANSPILE_ONLY=true
      - TS_NODE_COMPILER_OPTIONS={"module":"NodeNext","moduleResolution":"NodeNext"}
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 2s
      retries: 3

  # ==========================================
  # REGULAR SITE: DISTRIBUTION SITE (Edge & UI)
  # Handles high traffic by caching content and serving the Web UI.
  # ==========================================

  # Distribution server that caches content to reduce load on the core Backend API
  edge-server:
    build: ./services/edge-server
    container_name: live-edge-server
    environment:
      - REDIS_URL=redis://edge-redis:6379
      - BACKEND_API_URL=http://api:3000
      - TS_NODE_TRANSPILE_ONLY=true
      - TS_NODE_COMPILER_OPTIONS={"module":"NodeNext","moduleResolution":"NodeNext"}
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
      edge-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 3

  # Local Redis for the Edge site to store cached segments/playlists
  edge-redis:
    image: redis:alpine
    container_name: edge-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 1s
      retries: 3

  # React + Vite application that interacts only with the Edge Server (Frontend Client)
  web-ui:
    build: ./services/web-ui
    container_name: live-web-ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      edge-server:
        condition: service_healthy