
x-templates:
  streamer-base: &streamer-template
    build: services/streamer
    environment:
      - RECEIVER_HOST=live-receiver-1

  receiver-base: &receiver-template
    build: ./services/receiver
    environment:
      - REDIS_URL=redis://redis:6379
      - TS_NODE_TRANSPILE_ONLY=true
      - TS_NODE_COMPILER_OPTIONS={"module":"NodeNext","moduleResolution":"NodeNext"}
    depends_on:
      redis:
        condition: service_healthy

services:

  # ==========================================
  # THE STREAMERS (Video Sources)
  # ==========================================
  streamer-1:
    <<: *streamer-template
    container_name: live-streamer-1
    command: ["-re", "-i", "https://test-streams.mux.dev/x36xhzz/x36xhzz.m3u8", "-map", "0:v:2", "-map", "0:a:2", "-c", "copy", "-f", "mpegts", "udp://live-receiver-1:1234"]
    depends_on:
      receiver-1:
        condition: service_healthy

  streamer-2:
    <<: *streamer-template
    container_name: live-streamer-2
    command: ["-re", "-stream_loop", "-1", "-i", "/app/sample2.mp4", "-c:v", "libx264", "-preset", "superfast", "-tune", "zerolatency", "-c:a", "aac", "-f", "mpegts", "udp://live-receiver-2:1235"]
    depends_on:
      receiver-2:
        condition: service_healthy

  # ==========================================
  # BASE SITE: SOURCE SITE (Processing & Storage)
  # ==========================================

  redis:
    image: redis:alpine
    container_name: live-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 1s
      retries: 3

  receiver-1:
    <<: *receiver-template
    container_name: live-receiver-1
    environment:
      - REDIS_URL=redis://redis:6379
      - TS_NODE_TRANSPILE_ONLY=true
      - TS_NODE_COMPILER_OPTIONS={"module":"NodeNext","moduleResolution":"NodeNext"}
      - CHANNEL_NAME=channel1
      - UDP_PORT=1234
    volumes:
      - ./hls_out/ch1:/app/hls_out
    healthcheck:
      test: [ "CMD", "nc", "-zu", "127.0.0.1", "1234" ]
      interval: 3s
      timeout: 1s
      retries: 3

  receiver-2:
    <<: *receiver-template
    container_name: live-receiver-2
    environment:
      - REDIS_URL=redis://redis:6379
      - TS_NODE_TRANSPILE_ONLY=true
      - TS_NODE_COMPILER_OPTIONS={"module":"NodeNext","moduleResolution":"NodeNext"}
      - CHANNEL_NAME=channel2
      - UDP_PORT=1235
    volumes:
      - ./hls_out/ch2:/app/hls_out
    healthcheck:
      test: [ "CMD", "nc", "-zu", "127.0.0.1", "1235" ]
      interval: 3s
      timeout: 1s
      retries: 3

  # ==========================================
  # THE SOURCE GATEWAY: BACKEND API
  # ==========================================
  api:
    build: services/backend-api
    container_name: live-api
    environment:
      - REDIS_URL=redis://redis:6379
      - TS_NODE_TRANSPILE_ONLY=true
      - TS_NODE_COMPILER_OPTIONS={"module":"NodeNext","moduleResolution":"NodeNext"}
    ports:
      - "3000:3000"
    depends_on:
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/health"]
      interval: 5s
      timeout: 2s
      retries: 3

  # ==========================================
  # REGULAR SITE: DISTRIBUTION SITE (Edge & UI)
  # ==========================================

  edge-server:
    build: ./services/edge-server
    container_name: live-edge-server
    environment:
      - REDIS_URL=redis://edge-redis:6379
      - BACKEND_API_URL=http://api:3000
      - TS_NODE_TRANSPILE_ONLY=true
      - TS_NODE_COMPILER_OPTIONS={"module":"NodeNext","moduleResolution":"NodeNext"}
    ports:
      - "8080:8080"
    depends_on:
      api:
        condition: service_healthy
      edge-redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 5s
      timeout: 2s
      retries: 3

  edge-redis:
    image: redis:alpine
    container_name: edge-redis
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 1s
      retries: 3

  web-ui:
    build: ./services/web-ui
    container_name: live-web-ui
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8080
    depends_on:
      edge-server:
        condition: service_healthy